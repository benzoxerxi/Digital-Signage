name: Signage CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "digital-signage-saas/**"
      - ".github/workflows/signage-cicd.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-signage-saas
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint-free smoke check (import/compile)
        run: |
          python -m compileall -q .

      - name: Run tests if present
        run: |
          if [ -d "tests" ]; then
            pytest -q
          else
            echo "No tests directory yet, skipping pytest."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/digital-signage/Digital-Signage
            git fetch origin main
            git pull --ff-only origin main
            systemctl restart signage
            systemctl reload nginx
            systemctl is-active --quiet signage
            echo "Deploy completed successfully."
