name: Signage CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "digital-signage-saas/**"
      - ".github/workflows/signage-cicd.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-signage-saas
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint-free smoke check (import/compile)
        run: |
          python -m compileall -q .

      - name: Run tests if present
        run: |
          if [ -d "tests" ]; then
            pytest -q
          else
            echo "No tests directory yet, skipping pytest."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -eux
            REPO="/var/www/digital-signage/Digital-Signage"
            APP="${REPO}/digital-signage-saas"
            cd "${REPO}"
            echo "==> Repo: $(pwd)"
            git fetch origin main
            git pull --ff-only origin main
            if [ -x "${APP}/venv/bin/pip" ]; then
              echo "==> pip install (venv)"
              "${APP}/venv/bin/pip" install -r "${APP}/requirements.txt" -q
            else
              echo "==> WARNING: no ${APP}/venv/bin/pip — skipping pip (code updated only)"
            fi
            systemctl restart signage
            systemctl reload nginx
            systemctl is-active --quiet signage
            curl -fsS --max-time 15 http://127.0.0.1:8000/api/status >/dev/null
            echo "==> Deploy completed successfully."
