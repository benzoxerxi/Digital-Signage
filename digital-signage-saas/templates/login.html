{% extends "base.html" %}

{% block title %}Login - Digital Signage{% endblock %}

{% block extra_css %}
<style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        padding: 2rem 1rem;
        background: linear-gradient(160deg, #f0f4ff 0%, #e8eeff 50%, #f5f7fa 100%);
    }
    .auth-popup {
        width: 100%;
        max-width: 400px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
        padding: 2.5rem 2rem;
        animation: authPop 0.35s ease-out;
    }
    @keyframes authPop {
        from { opacity: 0; transform: scale(0.96) translateY(-8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .auth-popup h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1a1a2e;
        text-align: center;
        margin-bottom: 0.35rem;
    }
    .auth-popup .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 0.9375rem;
        margin-bottom: 1.75rem;
    }
    .auth-popup .form-group {
        margin-bottom: 1.25rem;
    }
    .auth-popup .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
        font-size: 0.875rem;
        color: #334155;
    }
    .auth-popup .form-group input {
        width: 100%;
        max-width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fafafa;
    }
    .auth-popup .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.12);
    }
    .auth-popup .form-group.checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }
    .auth-popup .form-group.checkbox input { width: auto; }
    .auth-popup .form-group.checkbox label { margin-bottom: 0; font-weight: 500; }
    .auth-popup .btn-submit {
        width: 100%;
        padding: 0.875rem 1.25rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }
    .auth-popup .btn-submit:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
    }
    .auth-popup .auth-links {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid #f1f5f9;
        font-size: 0.9375rem;
        color: #64748b;
    }
    .auth-popup .auth-links a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
    .auth-popup .auth-links a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-popup">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username or email</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter username or email" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group checkbox">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn-submit">Sign in</button>
        </form>
        <div class="auth-links">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
