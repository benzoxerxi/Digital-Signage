{% extends "base.html" %}

{% block title %}Sign Up - Digital Signage{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 4rem auto;
        padding: 2rem;
    }
    
    .auth-card {
        background: white;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .auth-card h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        text-align: center;
    }
    
    .auth-card p {
        text-align: center;
        color: #666;
        margin-bottom: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #333;
    }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s;
    }
    
    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: var(--primary);
    }
    
    .btn-full {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
    }
    
    .auth-links {
        text-align: center;
        margin-top: 1.5rem;
        color: #666;
    }
    
    .auth-links a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-links a:hover {
        text-decoration: underline;
    }
    
    .trial-badge {
        background: var(--success);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        text-align: center;
        margin-bottom: 1.5rem;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="trial-badge">🎉 7-Day Free Trial</div>
        <h1>Get Started</h1>
        <p>Create your account and start managing displays</p>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="company_name">Company Name (Optional)</label>
                <input type="text" id="company_name" name="company_name">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
                <small style="color: #666;">At least 6 characters</small>
            </div>
            
            <div class="form-group">
                <label for="plan">Select Plan</label>
                <select id="plan" name="plan">
                    <option value="free">Free Trial (7 days)</option>
                    <option value="starter">Starter - $29/month</option>
                    <option value="professional" selected>Professional - $79/month (Recommended)</option>
                    <option value="enterprise">Enterprise - $199/month</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        
        <div class="auth-links">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
