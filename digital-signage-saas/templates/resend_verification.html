{% extends "base.html" %}

{% block title %}Resend verification - Digital Signage{% endblock %}

{% block extra_css %}
<style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        padding: 2rem 1rem;
        background: linear-gradient(160deg, #f0f4ff 0%, #e8eeff 50%, #f5f7fa 100%);
    }
    .auth-popup {
        width: 100%;
        max-width: 400px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
        padding: 2.5rem 2rem;
    }
    .auth-popup h1 { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.5rem; }
    .auth-popup .subtitle { color: #64748b; font-size: 0.9375rem; margin-bottom: 1.25rem; }
    .auth-popup .form-group { margin-bottom: 1rem; }
    .auth-popup .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.875rem; color: #334155; }
    .auth-popup .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
    }
    .auth-popup .btn-submit {
        width: 100%;
        padding: 0.875rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
    }
    .auth-popup .auth-links { text-align: center; margin-top: 1rem; font-size: 0.9375rem; color: #64748b; }
    .auth-popup .auth-links a { color: var(--primary); font-weight: 600; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-popup">
        <h1>Resend verification email</h1>
        <p class="subtitle">Enter the email you used to sign up. We'll send a new verification link.</p>
        <form method="POST" action="{{ url_for('auth.resend_verification') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn-submit">Send verification email</button>
        </form>
        <div class="auth-links">
            <a href="{{ url_for('auth.login') }}">Back to sign in</a>
        </div>
    </div>
</div>
{% endblock %}
